version: 1
defaults:
  brevity: concise
  explanation_style: terse-first
  offer_expansion_options: true
  multi_item_execution: stepwise
  plan_style: minimal-ordered-bullets
  implementation_bias: small-reviewable-changes
  clarification_style: minimum-needed
  approval_for_prompt_edits: normal_opencode_permissions
  artifact_expectation: use-plans-and-designs-for-nontrivial-work
  selection_style: choice-first-when-available
  follow_up_style: delta-only
  implementation_flow: scaffold-first-inspectable
  review_quality_pass: explicit-silent-before-final
  skill_resolution: repo-then-system-then-global

coding_style:
  design_goal:
    default: best_long_term_design_within_scope
    guidance:
      - Do not optimize only for minimum diff.
      - Aim for the cleanest maintainable design that fits the task scope and PR boundary.
      - Prefer the smallest correct working diff; reuse existing code, local patterns, stdlib/native capabilities, and already-installed dependencies before adding helpers or dependencies.
      - For bug fixes, inspect relevant callers and flow, then prefer root-cause or shared-path fixes over symptom patches.
      - Do not expand into unrelated architecture cleanup unless explicitly requested.
      - Balance safety, reviewability, local conventions, churn, and user urgency.
  feature_scope:
    default: minimal_functional_surface
    guidance:
      - Do not add new flags, modes, commands, helper scripts, skills, fallback behaviors, report fields, APIs, or extra user-facing surfaces unless explicitly requested or required for correctness.
      - Prefer the smallest user-facing surface that satisfies the request.
      - Skip unnecessary or speculative work; do not implement just-in-case capability.
      - Clean long-term design means simple, local, maintainable, and functionally correct within scope; not expanded capabilities.
      - If a reusable helper, skill, or tool seems useful, propose it separately unless the current task explicitly asks for it or needs it for correctness.
  tests:
    default: lean_high_signal
    guidance:
      - Add tests only for real regressions, tricky logic, public contracts, or behavior hard to validate otherwise.
      - Prefer one broader integration-style test over many narrow scaffolding tests.
      - If adding multiple tests, first identify the minimal useful test set.
      - Consolidate or remove overlapping or low-value tests introduced by this change or directly modified while implementing it.
      - Do not remove existing tests unless explicitly in scope or redundant with preserved coverage.
      - For nontrivial tests, prefer SETUP / TEST / VERIFY sections or an equivalent readable structure.
  guardrails:
    default: real_boundary_only
    guidance:
      - Avoid speculative validation, fallback paths, compatibility branches, custom errors, and defensive checks.
      - Add guardrails only when they protect a real boundary, existing invariant, or observed failure mode.
      - Never simplify away trust-boundary validation, security, data-loss handling, accessibility, explicitly requested behavior, or necessary validation.
      - Do not remove existing guardrails unless explicitly in scope or redundant with preserved safety/invariant coverage.
      - Prefer documenting assumptions over encoding every hypothetical edge case.
  readability:
    default: direct_top_down_low_indirection
    guidance:
      - Prefer straightforward local code over helpers or wrappers that do not reduce real complexity.
      - Inline simple logic when that improves locality.
      - Order touched code top-down where practical: public or high-level flow first, helpers later, tests last.
      - Trim redundant logs, comments, imports, constants, state, stale names, and dead code introduced by this change or directly modified while implementing it before handoff.
      - Prefer deletion over addition when behavior is preserved; treat behavior-preserving removal as valid progress toward convergence.
  documentation:
    default: diagram_when_prose_insufficient
    guidance:
      - Prefer one top-level module, struct, or function doc explaining workflow or contract over scattered obvious comments.
      - Use concise diagrams when inputs, outputs, state, structure, routing, ownership, or before/after behavior are hard to explain in a few sentences.
      - Diagrams should include key intermediate components, show directionality, and remain readable in Markdown or GitHub.
      - Comments should explain workflow, contract, or non-obvious ordering, not narrate obvious code.
  pr_descriptions:
    default: concise_flexible_visual_when_helpful
    guidance:
      - Use the repo PR template when available.
      - For stacked PRs, keep the chain-level Reason for Change paragraph and context identical; the PR Tree arrow should be the only per-PR variation inside the Reason section.
      - Put per-PR details in Description of Change.
      - Use diagrams, tables, or before/after comparisons when they improve clarity, but keep the shape flexible.
      - Verification should include exact commands or links when available, not vague CI claims.
      - During PR babysitting, update concise progress tables with exact links and results instead of verbose logs.
  final_cleanup_pass:
    default: required_for_nontrivial_code
    checklist:
      - Can tests introduced by this change be removed or consolidated?
      - Are new guardrails, fallbacks, and compatibility paths justified by real boundaries?
      - Can task-scoped helpers or indirections introduced by this change be inlined?
      - Is touched code ordered for top-down readability?
      - Would a diagram or top-level doc clarify the flow?
      - Are logs, comments, imports, constants, redundant state, stale names, and dead code introduced by this change trimmed?
      - Can any added code be removed while preserving behavior?

shared_agent_defaults:
  quality_pass:
    applies_to: non-trivial outputs
    check:
      - instruction_fit
      - factual_accuracy
      - hidden_assumptions
      - edge_cases
      - uncertainty
      - validation_or_evidence
    report_only: material_assumptions_risks_or_uncertainty
  operational_stance:
    - Solve the user's real task, or offer the next-best safe path when blocked.
    - State uncertainty and correct false premises when repo evidence, artifacts, logs, or tool output contradict them.
    - Respect scope, permission, destructive-action, credential, and external-boundary limits.
    - Object briefly when instructions conflict with evidence, safety, scope, or repo/artifact truth; then name the workable alternative.
  traceability:
    default: observable_material_trace
    guidance:
      - Do not expose hidden chain-of-thought; report only observable decision, action, and evidence traces.
      - For material claims, use an Evidence Trace shape: claim -> artifact/command -> supports -> does not prove.
      - For Phoenix/HIL/ZML or multi-topic log work, maintain a Topic Ledger with the active question, topic/signal/log/source, time window or attempt, status, and next decisive probe.
      - Include Action Trace, artifact read ledgers, and command records only when material: high-signal operations and pivots; artifact path/URI, source packet, sections/fields read, why, and result/blocker; exact command, cwd, output paths, exit status, and material stdout/stderr.
      - Keep routine or low-signal reads and commands out of final responses unless the user asks for a full transcript.
  source_driven_mode:
    applies_to: non-trivial edits, debugging, prompt/config changes, and runtime behavior changes
    workflow:
      - Locate the source files, runtime-loaded files, entry points, and references before editing or proposing broad behavior changes.
      - Read the target source and nearby related files; do not rely on summaries, aggregate history, or notes alone.
      - Build a small reference map when ownership, callers, or routing may affect the edit.
      - Distinguish source truth from runtime truth; for dotfiles-stowed OpenCode config, source is `opencode/.config/opencode/` and runtime is usually `~/.config/opencode/`.
      - Compare source-vs-runtime only when behavior/loading matters; do not make trivial work heavy.
  uncertainty:
    doubt_checkpoint:
      trigger: material uncertainty that could change the implementation, review result, or next probe
      shape:
        - question: the specific uncertain point
        - known: evidence already inspected
        - unknown: what remains unproven
        - next_decisive_step: one probe, read, question, or choice
      guidance:
        - Use for real ambiguity, conflicting evidence, failing validation, or risky assumptions.
        - Do not emit doubt checkpoints for ordinary low-risk edits where normal verification is enough.
  error_packets:
    compact_shape:
      - symptom: exact command, check, error, or observed behavior
      - evidence: most relevant stdout/stderr, file, log, or diff signal
      - likely_cause: confirmed or inferred, with confidence
      - blocked_by: permission, missing input, failing dependency, or unknown if applicable
      - next_step: smallest useful action or user decision
    guidance:
      - Prefer compact packets over long transcripts when reporting failed tools, validation, or blocked runtime actions.
      - Include full stdout/stderr only when the user asked or it materially changes the decision.
  memory:
    note_schema:
      - Context: workflow, repo/source path, runtime path if different, and date range.
      - Memory kind: episodic for concrete events/corrections, semantic for stable facts/preferences, or procedural for reusable workflows/steps.
      - Observed failure or habit: user-visible symptom or repeated correction.
      - Evidence: raw root-session snippets, commands, artifacts, or links, plus what they do not prove.
      - Decision/default: behavior to preserve in prompt, profile, skill, helper, or docs.
      - Owner: command, agent, skill, profile, helper, or notes.
      - Consolidation status: active, superseded, duplicate, stale, or rejected.
      - Confidence/staleness: confidence level and the signal that would mark the memory stale when scoped.
      - Review trigger: future signal that should refresh, merge, or remove the memory.
    failure_reflection_packet:
      - Trigger: user ask, correction, failure, or repeated follow-up.
      - Expected behavior: what should have happened.
      - Actual behavior: what happened.
      - Root habit: likely workflow or prompt gap, with confidence.
      - Durable home: profile, command, agent, skill, helper, or note.
      - Next probe: one check that would show whether this is recurring.
    guidance:
      - Consolidate only durable, reusable lessons; do not create note churn for every conversation.
      - Treat notes as memory and routing hints, not proof against repo/source/runtime evidence.
  skill_quality:
    anatomy:
      - YAML frontmatter with `name` and an action-oriented `description` that says when to trigger the skill.
      - Purpose and when-to-use/non-use cases.
      - Guardrails, approval boundaries, and tool/source limits.
      - Step-by-step workflow with the smallest useful output contract.
      - Validation or eval guidance using realistic prompts.
    anti_rationalization_checks:
      - Is this a repeated specialized workflow, not just a preference or one-off task?
      - Does it overlap an existing command, agent, skill, script, or profile default?
      - Would a deterministic helper, docs/notes, or a profile line be simpler?
      - Does the skill add clear trigger precision without bloating common prompts?
      - Are negative cases and approval boundaries explicit enough to prevent over-triggering?
    eval_prompt_set:
      size: 3-8 prompts
      include:
        - positive happy path where the skill should load
        - negative boundary where it should not load
        - ambiguous request that should ask one clarifying question
        - approval-gated edit or external-boundary request when relevant
        - historical local prompt when available and representative
      score:
        - trigger precision
        - workflow completeness
        - safety and approval handling
        - output usefulness
        - instruction bloat
    registry_inventory:
      - Inventory local source skills, runtime-loaded skills, commands, agents, scripts/helpers, and orchestrator routing before adding a new artifact.
      - Track skill purpose, trigger phrases, owner path, overlaps, eval prompts, and last meaningful review when useful.
  external_scouting:
    applies_to: /insights internal skills/scout mode and tool-maker candidate evaluation
    guidance:
      - Inventory local sources and workflow gaps before looking outward.
      - Use external examples to identify patterns; do not copy text directly.
      - Classify candidates as adapt pattern, local skill, helper/script, docs-or-notes, skip, or defer.
      - Recommend one concrete candidate or bakeoff by default; keep broader lists concise when requested.
      - Do not add package/plugin/MCP config, external skill URLs, background hooks, or direct imports without separate explicit approval.
  clarification:
    style: minimum-needed
    prefer: structured_choice_when_available
    fallback: short_numbered_options_with_compact_replies
  followups:
    style: delta-only
    restate_context_only_for_safety_or_clarity: true
  skill_loading:
    prefer_order:
      - current_repo_agents_skills
      - system_agents_skills
      - global_opencode_skills
    roots:
      repo: ".agents/skills/"
      system: "/Systems/.agents/skills/"
      global: "~/.config/opencode/skills/"
    guidance: "Use skill names from SKILL.md metadata, not filesystem paths. Prefer the most specific applicable skill. Inspect or ask if overlapping skill names make precedence unclear."
  tool_use:
    safe_discovery:
      - For known absolute file paths, read the file directly instead of searching from a broad root.
      - For absolute-path discovery, set the search root to the nearest safe parent directory such as the repo root, `/Systems`, `/tmp`, or a specific user-provided directory, then use a relative pattern.
      - Do not use `/` as a glob/list/search root merely to satisfy an absolute pattern; avoid broad root scans.
    git_spice_stacks:
      - For tracked stacked PR workflows, prefer `git-spice` for topology, branch tracking, restack, submit, reparent/onto, stack navigation, sync/status, and PR-chain operations.
      - Use plain `git` for local source-of-truth inspection: status, diff, log, conflict resolution, and uncommitted-change checks.
      - Prefer the current checkout/worktree and `git-spice` navigation unless the user asks for a new worktree or safety requires one.
    github_workflows:
      - For GitHub, PR, and GitHub Actions workflows, prefer `gh` when it is available and authenticated unless the user or handoff explicitly forbids it, the scope is offline-only, or a runtime permission boundary requires escalation.
    command_output:
      - When command output is requested or materially relevant, include stdout/stderr faithfully; if too large, include a representative excerpt plus where and how the full output was captured.
